<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPZ · Race UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
@font-face { font-family: 'Panchang'; src: url('public/fonts/Panchang-Variable.ttf') format('truetype'); font-weight: 100 900; }

:root {
  --panchang: 'Panchang', sans-serif;
  --spz-bg: #07080A; --spz-surface-1: #0E1014; --spz-surface-2: #14171C; --spz-surface-3: #1B1F26;
  --spz-line: rgba(255,255,255,0.07); --spz-line-faint: rgba(255,255,255,0.04); --spz-line-strong: rgba(255,255,255,0.13);
  --spz-fg-1: #F0F2F5; --spz-fg-2: #A8AEBB; --spz-fg-3: #5C6370; --spz-fg-4: #3A3F4A;
  --spz-orange: #FF6200; --spz-danger: #FF3D55; --spz-success: #29D398;
  --spz-font-display: 'Panchang', 'Inter', sans-serif;
  --spz-font-body: 'Inter', system-ui, sans-serif;
  --spz-font-mono: 'JetBrains Mono', monospace;
  --spz-shadow-2: 0 4px 16px rgba(0,0,0,0.5), 0 1px 4px rgba(0,0,0,0.4);
  --spz-shadow-3: 0 12px 32px rgba(0,0,0,0.6);
  --spz-ease-out: cubic-bezier(0,0,0.2,1);
  --spz-ease-snap: cubic-bezier(0.16,1,0.3,1);
  --spz-radius-3: 6px; --spz-radius-4: 8px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: transparent; font-family: var(--spz-font-body); -webkit-font-smoothing: antialiased; }
.spz-eyebrow { font-family: var(--spz-font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--spz-fg-3); }

.spz-badge {
  display: inline-flex; align-items: center; height: 18px; padding: 0 6px; border-radius: 4px;
  font-family: var(--spz-font-mono); font-size: 9px; font-weight: 700; text-transform: uppercase;
  background: var(--spz-surface-3); border: 1px solid var(--spz-line); color: var(--spz-fg-2);
}
.spz-badge[data-variant="solid"] { background: var(--spz-orange); color: #000; border: none; }
.spz-badge[data-variant="success"] { background: rgba(41,211,152,0.1); color: var(--spz-success); border-color: rgba(41,211,152,0.3); }

/* ── Countdown ── */
.countdown-wrap { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
.countdown-num {
  font-family: var(--panchang); font-weight: 800; font-style: italic; font-size: 320px; line-height: 0.8;
  color: var(--spz-fg-1); text-shadow: 0 20px 80px rgba(0,0,0,0.5);
  animation: count-in 300ms var(--spz-ease-out);
}
.countdown-go {
  font-family: var(--panchang); font-weight: 800; font-style: italic; font-size: 220px; line-height: 0.8;
  color: var(--spz-orange); text-shadow: 0 0 100px rgba(255,98,0,0.4), 0 20px 60px rgba(0,0,0,0.6);
  animation: go-in 300ms var(--spz-ease-out);
}
@keyframes count-in { from { transform: scale(0.9) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
@keyframes go-in { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.countdown-info { position: absolute; bottom: 8vh; display: flex; align-items: center; gap: 20px; animation: spz-in 600ms var(--spz-ease-out); }
@keyframes spz-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ── Overlay / HUD ── */
.hud-top-left { position: absolute; top: 4vh; left: 2.5vw; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.hud-top-right { position: absolute; top: 4vh; right: 2.5vw; display: flex; flex-direction: column; align-items: flex-end; gap: 16px; pointer-events: none; }

.metric-box { display: flex; flex-direction: column; align-items: flex-end; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
.metric-label { font-family: var(--spz-font-mono); font-size: 10px; font-weight: 600; color: var(--spz-orange); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 2px; }
.metric-value { font-family: var(--panchang); font-weight: 800; font-size: 32px; color: var(--spz-fg-1); line-height: 1; }
.metric-sub { font-size: 16px; color: var(--spz-fg-3); margin-left: 4px; }

.timer-large { font-family: var(--spz-font-mono); font-weight: 600; font-size: 42px; color: var(--spz-fg-1); font-variant-numeric: tabular-nums; line-height: 1; }

/* Standings */
.standings-wrap { display: flex; flex-direction: column; gap: 4px; }
.stand-row {
  position: relative; width: 280px; height: 38px; background: rgba(14,16,20,0.95);
  border: 1px solid var(--spz-line); display: flex; align-items: center; overflow: hidden;
  transition: transform 200ms var(--spz-ease-out);
}
.stand-row[data-me="true"] { border-left: 3px solid var(--spz-orange); transform: scale(1.04) translateX(4px); background: #14171C; z-index: 2; box-shadow: var(--spz-shadow-2); }
.stand-num { width: 34px; height: 100%; display: flex; align-items: center; justify-content: center; font-family: var(--panchang); font-weight: 700; font-size: 14px; background: rgba(255,255,255,0.03); border-right: 1px solid var(--spz-line-faint); }
.stand-avatar { width: 26px; height: 26px; margin: 0 10px; border-radius: 2px; border: 1px solid var(--spz-line); }
.stand-name { font-family: var(--spz-font-display); font-weight: 700; font-size: 13px; text-transform: uppercase; color: var(--spz-fg-1); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.stand-gap { font-family: var(--spz-font-mono); font-size: 11px; color: var(--spz-orange); margin-right: 12px; }

/* ── Menu / Modals ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 5000; }
.modal-card { width: 600px; background: var(--spz-surface-1); border: 1px solid var(--spz-line-strong); border-radius: var(--spz-radius-4); box-shadow: var(--spz-shadow-3); overflow: hidden; }
.modal-header { padding: 24px; border-bottom: 1px solid var(--spz-line); display: flex; justify-content: space-between; align-items: center; }
.modal-title { font-family: var(--spz-font-display); font-weight: 700; font-size: 24px; color: var(--spz-fg-1); text-transform: uppercase; letter-spacing: 0.05em; }
.modal-body { max-height: 400px; overflow-y: auto; padding: 12px; }

.track-item { 
  display: flex; align-items: center; padding: 16px; border-radius: var(--spz-radius-3); cursor: pointer;
  transition: all 150ms; border: 1px solid transparent; margin-bottom: 4px;
}
.track-item:hover { background: var(--spz-surface-2); border-color: var(--spz-line); transform: translateX(4px); }
.track-name { font-family: var(--spz-font-display); font-weight: 600; font-size: 16px; color: var(--spz-fg-1); flex: 1; }

/* ── Post Race ── */
.stats-strip {
  position: fixed; top: 0; left: 0; width: 100vw; height: 90px;
  background: rgba(7,8,10,0.98); border-bottom: 1px solid var(--spz-line);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 2000; overflow: hidden; animation: stats-in 800ms var(--spz-ease-snap);
}
@keyframes stats-in { from { transform: translateY(-100%); } to { transform: translateY(0); } }

.stats-bg-text {
  position: absolute; font-family: var(--panchang); font-weight: 800; font-size: 140px;
  color: rgba(255,255,255,0.03); white-space: nowrap; pointer-events: none; z-index: 0; text-transform: uppercase;
}
.stats-content { position: relative; z-index: 1; width: 800px; display: flex; flex-direction: column; align-items: center; }
.stats-title { font-family: var(--spz-font-mono); font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--spz-orange); margin-bottom: 8px; }

.stats-result { display: flex; align-items: center; justify-content: space-between; width: 100%; }
.stats-p { font-family: var(--panchang); font-weight: 800; font-size: 48px; color: var(--spz-orange); }

.prog-bar-container { width: 100%; height: 28px; background: var(--spz-surface-3); position: relative; overflow: hidden; border: 1px solid var(--spz-line); }
.prog-bar-fill { position: absolute; inset: 0; background: var(--spz-orange); transition: width 1s var(--spz-ease-out); }
.prog-bar-segments { position: absolute; inset: 0; display: flex; justify-content: space-between; pointer-events: none; }
.prog-bar-seg { width: 1px; height: 100%; background: rgba(0,0,0,0.3); }

.diff-line { width: 100%; height: 1px; background: var(--spz-line-strong); position: relative; margin: 10px 0; }
.diff-dot { position: absolute; top: 50%; width: 10px; height: 10px; border-radius: 50%; background: var(--spz-orange); box-shadow: 0 0 10px var(--spz-orange); transform: translate(-50%, -50%); transition: left 1s var(--spz-ease-out); }
.diff-center { position: absolute; left: 50%; top: -6px; bottom: -6px; width: 1px; background: var(--spz-fg-4); }

.fade-up { animation: fade-up 300ms var(--spz-ease-out); }
@keyframes fade-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* TT HUD Extras */
.tt-laps-box { position: absolute; top: 18vh; right: 2.5vw; display: flex; flex-direction: column; gap: 4px; pointer-events: none; }
.lap-item { 
  display: flex; gap: 12px; font-family: var(--spz-font-mono); font-size: 12px; 
  background: rgba(0,0,0,0.2); padding: 4px 10px; border-left: 2px solid var(--spz-line);
}
.lap-item[data-best="true"] { border-left-color: var(--spz-success); color: var(--spz-success); background: rgba(41,211,152,0.05); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/preact@latest/dist/preact.min.js"></script>
<script src="https://unpkg.com/preact@latest/hooks/dist/hooks.umd.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script type="text/babel">
/** @jsx h */
/** @jsxFrag Fragment */
const { h, render, Fragment } = preact;
const { useState, useEffect, useRef, useMemo } = preactHooks;

function formatMs(ms) {
  if (!ms || ms < 0) return '00:00.00';
  const totalSeconds = Math.floor(ms / 1000);
  const mins = Math.floor(totalSeconds / 60);
  const secs = totalSeconds % 60;
  const cs = Math.floor((ms % 1000) / 10);
  return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
}

function StandingRow({ racer, isMe }) {
  return (
    <div className="stand-row" data-me={isMe}>
      <div className="stand-num">{racer.position}</div>
      {racer.banner && <img src={racer.banner} className="stand-banner" style={{ position: 'absolute', inset: 0, opacity: 0.15, objectFit: 'cover' }} />}
      <img src={racer.avatar || 'https://i.imgur.com/8NzA8m8.png'} className="stand-avatar" alt="" />
      <div className="stand-name">{racer.name}</div>
      <div className="stand-gap">{racer.gap || ''}</div>
    </div>
  );
}

function RaceOverlay({ data, lapTime, raceTime }) {
  const racers = data.positions || [];
  const top4 = racers.slice(0, 4);
  const myIndex = racers.findIndex(r => r.source === data.mySource);
  const showMyRow = myIndex >= 4;

  return (
    <Fragment>
      <div className="hud-top-left">
        <div className="standings-wrap">
          {top4.map((r, i) => <StandingRow key={r.source} racer={r} isMe={r.source === data.mySource} />)}
          {showMyRow && (
            <Fragment>
              <div style={{ height: 2, background: 'var(--spz-line-faint)', margin: '2px 0' }} />
              <StandingRow racer={racers[myIndex]} isMe={true} />
            </Fragment>
          )}
        </div>
      </div>

      <div className="hud-top-right">
        <div style={{ display: 'flex', gap: 40 }}>
          <div className="metric-box">
            <span className="metric-label">Position</span>
            <div className="metric-value">
              <span style={{ fontSize: 24, color: 'var(--spz-orange)', marginRight: 4 }}>P</span>
              {data.position || 1}<span className="metric-sub">/ {data.totalRacers || '-'}</span>
            </div>
          </div>
          <div className="metric-box">
            <span className="metric-label">Lap</span>
            <div className="metric-value">{data.lapNum || 1}<span className="metric-sub">/ {data.totalLaps || '-'}</span></div>
          </div>
        </div>

        <div className="metric-box" style={{ marginTop: 8 }}>
          <span className="metric-label">Current Lap</span>
          <div className="timer-large">{formatMs(lapTime)}</div>
          <div style={{ display: 'flex', justifyContent: 'space-between', width: '100%', marginTop: 6 }}>
            <span style={{ fontFamily: 'var(--spz-font-mono)', fontSize: 11, color: 'var(--spz-fg-3)' }}>RACE {formatMs(raceTime)}</span>
            {data.bestLapTime > 0 && (
              <span style={{ fontFamily: 'var(--spz-font-mono)', fontSize: 11, color: 'var(--spz-orange)', fontWeight: 600 }}>BEST {formatMs(data.bestLapTime)}</span>
            )}
          </div>
        </div>
      </div>
    </Fragment>
  );
}

function TimeTrialOverlay({ data, lapTime }) {
  return (
    <div className="hud-top-right">
      <div style={{ display: 'flex', gap: 40 }}>
        <div className="metric-box">
          <span className="metric-label">Phase</span>
          <div className="metric-value" style={{ fontSize: 24, textTransform: 'uppercase' }}>{data.lapLabel || 'PRACTICE'}</div>
        </div>
        <div className="metric-box">
          <span className="metric-label">Checkpoint</span>
          <div className="metric-value">{data.cpIndex || 1}<span className="metric-sub">/ {data.cpTotal || '?'}</span></div>
        </div>
      </div>

      <div className="metric-box" style={{ marginTop: 8 }}>
        <span className="metric-label">Current Lap</span>
        <div className="timer-large">{formatMs(lapTime)}</div>
        <div style={{ display: 'flex', justifyContent: 'space-between', width: '100%', marginTop: 6 }}>
           <span style={{ fontFamily: 'var(--spz-font-mono)', fontSize: 11, color: 'var(--spz-fg-3)' }}>{data.track || 'Track'}</span>
           {data.bestLap > 0 && (
             <span style={{ fontFamily: 'var(--spz-font-mono)', fontSize: 11, color: 'var(--spz-success)', fontWeight: 600 }}>BEST {formatMs(data.bestLap)}</span>
           )}
        </div>
      </div>
      
      {data.allLaps?.length > 0 && (
        <div className="tt-laps-box">
          {[...data.allLaps].reverse().slice(0, 3).map((l, i) => (
            <div key={i} className="lap-item" data-best={l.isBest}>
              <span style={{ opacity: 0.5 }}>L{l.lapNum}</span>
              <span>{l.time}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function PostRaceStats({ data }) {
  const [cardIdx, setCardIdx] = useState(0);
  const sequence = ['result', 'xp', 'points', 'ir', 'sr'];
  const card = sequence[cardIdx];

  useEffect(() => {
    const t = setInterval(() => {
      setCardIdx(prev => (prev + 1) % sequence.length);
    }, 4000);
    return () => clearInterval(t);
  }, []);

  const title = {
    result: 'Position Report',
    xp: 'Experience Gained',
    points: 'Class Progression',
    ir: 'Skill Differential',
    sr: 'Safety Telemetry'
  }[card];

  return (
    <div className="stats-strip">
      <div className="stats-bg-text">{title}</div>
      <div className="stats-content">
        <div className="stats-title">{title}</div>
        <div key={card} className="stats-content-inner fade-up" style={{ width: '100%' }}>
          {card === 'result' && (
            <div className="stats-result">
              <div style={{ flex: 1 }}>
                <div className="spz-eyebrow">{data.trackName || 'TRACK'}</div>
                <div style={{ fontSize: 24, fontWeight: 600 }}>{data.finishTime || '00:00.00'}</div>
              </div>
              <div className="stats-p">P{data.position || 1}</div>
              <div style={{ flex: 1, textAlign: 'right' }}>
                <div className="spz-eyebrow">Best Lap</div>
                <div style={{ fontSize: 24, fontWeight: 600 }}>{data.bestLap || '00:00.00'}</div>
              </div>
            </div>
          )}
          {(card === 'xp' || card === 'points') && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
              <div style={{ fontSize: 36, fontWeight: 800, color: 'var(--spz-orange)', fontFamily: 'var(--panchang)' }}>
                +{card === 'xp' ? data.xpGained : data.classPointsGained}
              </div>
              <div className="prog-bar-container">
                <div className="prog-bar-fill" style={{ width: `${(card === 'xp' ? data.xpNewProgress : data.cpNewProgress) * 100}%` }} />
                <div className="prog-bar-segments">
                  {Array.from({ length: 40 }).map((_, i) => <div key={i} className="prog-bar-seg" />)}
                </div>
              </div>
            </div>
          )}
          {card === 'ir' && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 32 }}>
              <div style={{ fontSize: 32, fontWeight: 800, color: data.iRatingDelta >= 0 ? 'var(--spz-orange)' : 'var(--spz-danger)' }}>
                {data.iRatingDelta >= 0 ? '+' : ''}{data.iRatingDelta}
              </div>
              <div className="diff-line">
                <div className="diff-center" />
                <div className="diff-dot" style={{ left: `${50 + (data.iRatingDelta || 0)}%` }} />
              </div>
            </div>
          )}
          {card === 'sr' && (
            <div style={{ textAlign: 'center', fontSize: 42, fontWeight: 800, color: data.safetyRatingDelta >= 0 ? 'var(--spz-orange)' : 'var(--spz-danger)' }}>
               {data.safetyRatingDelta >= 0 ? '+' : ''}{data.safetyRatingDelta}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState('none');
  const [countdown, setCountdown] = useState(null);
  const [overlayData, setOverlayData] = useState({});
  const [statsData, setStatsData] = useState(null);

  // Time Trial States
  const [ttTracks, setTtTracks] = useState([]);
  const [ttHudData, setTtHudData] = useState({});

  const [lapTime, setLapTime] = useState(0);
  const [raceTime, setRaceTime] = useState(0);
  const lapStart = useRef(0);
  const raceStart = useRef(0);
  const isRunning = useRef(false);

  const post = (action, data = {}) => {
    fetch(`https://${GetParentResourceName()}/${action}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    }).catch(() => {});
  };

  useEffect(() => {
    const handler = (e) => {
      if (!e.data || !e.data.action) return;
      const { action, data = {} } = e.data;
      
      if (action === 'countdown') {
        setCountdown(data);
        setView('countdown');
        if (data.isGo) {
          isRunning.current = true;
          lapStart.current = Date.now();
          raceStart.current = Date.now();
          setTimeout(() => setView('overlay'), 2000);
        }
      } else if (action === 'raceOverlay') {
        if (data.visible === false) {
          setView('none');
          isRunning.current = false;
        } else {
          setOverlayData(prev => ({ ...prev, ...(data || {}) }));
          setView('overlay');
          if (data.resetTimer) {
            lapStart.current = Date.now();
            raceStart.current = Date.now();
            isRunning.current = true;
          }
        }
      } else if (action === 'postRaceStats') {
        setStatsData(data);
        setView(data ? 'stats' : 'none');
      } else if (action === 'hideAll') {
        setView('none');
        isRunning.current = false;
      }
      
      // Time Trial Handlers
      else if (action === 'tt_open_menu') {
        setTtTracks(data.tracks || []);
        setView('tt_menu');
      } else if (action === 'tt_hud_show') {
        setTtHudData(data);
        setView('tt_hud');
        isRunning.current = true;
        lapStart.current = Date.now();
      } else if (action === 'tt_timer') {
        // We use our local timer for smooth updates, but can sync if needed
      } else if (action === 'tt_lap_started') {
        setTtHudData(prev => ({ ...prev, ...data }));
        lapStart.current = Date.now();
        isRunning.current = true;
      } else if (action === 'tt_lap_complete') {
        setTtHudData(prev => ({ ...prev, bestLap: data.bestLap, allLaps: data.times.map((t, i) => ({ lapNum: i+1, time: formatMs(t), isBest: t === data.bestLap })) }));
      } else if (action === 'tt_hide') {
        setView('none');
        isRunning.current = false;
      }
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    let raf;
    const update = () => {
      if (isRunning.current) {
        setLapTime(Date.now() - lapStart.current);
        setRaceTime(Date.now() - raceStart.current);
      }
      raf = requestAnimationFrame(update);
    };
    raf = requestAnimationFrame(update);
    return () => cancelAnimationFrame(raf);
  }, []);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape' && view === 'tt_menu') {
        post('tt_closeMenu');
        setView('none');
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [view]);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  return (
    <Fragment>
      {view === 'countdown' && countdown && (
        <div className="countdown-wrap">
          {countdown.isGo ? (
            <div className="countdown-go">RACE</div>
          ) : (
            <div className="countdown-num">{countdown.number}</div>
          )}
          {!countdown.isGo && (
            <div className="countdown-info">
              <div style={{ textAlign: 'right' }}>
                <div className="spz-eyebrow" style={{ color: 'var(--spz-orange)' }}>{countdown.track || 'Track'}</div>
                <div style={{ fontFamily: 'var(--panchang)', fontWeight: 700, fontSize: 18, color: 'var(--spz-fg-1)', textTransform: 'uppercase' }}>{countdown.class || 'B'} Class &bull; {countdown.laps || 3} Laps</div>
              </div>
              <div style={{ width: 1, height: 40, background: 'var(--spz-line)' }} />
              <div>
                <div className="spz-eyebrow">Grid Position</div>
                <div style={{ fontFamily: 'var(--panchang)', fontWeight: 700, fontSize: 18, color: 'var(--spz-fg-1)' }}>P{countdown.gridPos || 1} / {countdown.total || 8}</div>
              </div>
            </div>
          )}
        </div>
      )}

      {view === 'overlay' && (
        <RaceOverlay data={overlayData} lapTime={lapTime} raceTime={raceTime} />
      )}

      {view === 'stats' && statsData && (
        <PostRaceStats data={statsData} />
      )}

      {/* Time Trial UI */}
      {view === 'tt_menu' && (
        <div className="modal-overlay">
          <div className="modal-card fade-up">
            <div className="modal-header">
              <div className="modal-title">Time Trial Selection</div>
              <div className="spz-eyebrow" style={{ color: 'var(--spz-orange)' }}>Solo Practice</div>
            </div>
            <div className="modal-body">
              {ttTracks.map(t => (
                <div key={t.index} className="track-item" onClick={() => { post('tt_selectTrack', { index: t.index }); setView('none'); }}>
                  <div className="track-name">{t.name}</div>
                  <div className="spz-badge" data-variant="solid" style={{ marginRight: 12 }}>{t.type}</div>
                  <div className="spz-eyebrow">{t.laps} LAPS</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {view === 'tt_hud' && (
        <TimeTrialOverlay data={ttHudData} lapTime={lapTime} />
      )}
    </Fragment>
  );
}

render(<App />, document.getElementById('root'));
</script>
</body>
</html>
